<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-ink Dashboard Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 p-6">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-white text-center">E-ink BLE Controller</h1>
        
        <button id="connectBle" class="w-full py-4 bg-indigo-600 rounded-xl font-bold mb-6 hover:bg-indigo-500 transition">Kết nối Bluetooth</button>
        
        <!-- Các nút chức năng đã giải mã -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="sendCommandChain(['e102', 'e2'])" class="py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold">Clock & E2</button>
            <button onclick="sendCommandChain(['e101', 'e2'])" class="py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold">Calendar & E2</button>
            <button onclick="sendCommandChain(['e4', 'e2'])" class="py-4 bg-purple-600 hover:bg-purple-500 rounded-xl font-bold">Toggle Color</button>
            <button onclick="sendCommand('e5')" class="py-4 bg-orange-600 hover:bg-orange-500 rounded-xl font-bold">Refresh (E5)</button>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <label class="block text-sm mb-2 text-slate-400">Gửi lệnh tùy chỉnh:</label>
            <input type="text" id="commandInput" placeholder="Ví dụ: e102" class="w-full bg-slate-900 p-3 rounded-lg mb-4 border border-slate-600 text-white">
            <button onclick="sendRawCommand()" class="w-full py-3 bg-emerald-600 rounded-lg font-bold">Gửi lệnh</button>
        </div>

        <div id="logContainer" class="mt-6 h-40 overflow-y-auto text-xs text-emerald-400 bg-black p-4 rounded-lg border border-slate-700">
            <div>Đã sẵn sàng. Vui lòng kết nối Bluetooth.</div>
        </div>
    </div>

    <script>
        let bleCharacteristic = null;
        const logContainer = document.getElementById('logContainer');

        function addLog(msg) {
            logContainer.innerHTML += `<div>> ${msg}</div>`;
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        document.getElementById('connectBle').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ 
                    acceptAllDevices: true, 
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb'] 
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                bleCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                addLog("Kết nối thành công!");
            } catch (e) { addLog("Lỗi kết nối: " + e.message); }
        };

        // Gửi chuỗi nhiều lệnh liên tiếp
        async function sendCommandChain(commands) {
            if (!bleCharacteristic) return alert("Chưa kết nối!");
            const encoder = new TextEncoder();
            for (const cmd of commands) {
                try {
                    await bleCharacteristic.writeValue(encoder.encode(cmd));
                    addLog("Đã gửi: " + cmd);
                    await new Promise(r => setTimeout(r, 300)); // Delay 300ms giữa các lệnh
                } catch (e) { addLog("Lỗi gửi " + cmd + ": " + e.message); }
            }
        }

        // Gửi 1 lệnh đơn
        async function sendCommand(cmd) {
            sendCommandChain([cmd]);
        }

        async function sendRawCommand() {
            if (!bleCharacteristic) return alert("Chưa kết nối!");
            const val = document.getElementById('commandInput').value;
            sendCommand(val);
        }
    </script>
</body>
</html>
